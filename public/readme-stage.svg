<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="1600" height="640" role="img" aria-label="Voltex Notes — knowledge graph stage">
  <defs>
    <radialGradient id="vg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0b0b0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ve" x1="0" x2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background card -->
  <rect width="800" height="320" rx="16" fill="#0b0b0f"/>
  <rect width="800" height="320" rx="16" fill="url(#vg)"/>

  <!-- subtle grid -->
  <g stroke="#f4f0e6" stroke-opacity="0.025">
    <path d="M0 80 H800 M0 160 H800 M0 240 H800"/>
    <path d="M200 0 V320 M400 0 V320 M600 0 V320"/>
  </g>

  <!-- concentric rings -->
  <g fill="none" stroke="#a78bfa" stroke-opacity="0.22">
    <circle cx="400" cy="160" r="70"/>
    <circle cx="400" cy="160" r="120"/>
    <circle cx="400" cy="160" r="170"/>
  </g>

  <!-- edges -->
  <g stroke="url(#ve)" stroke-width="1.2">
    <line x1="400" y1="160" x2="240" y2="80"/>
    <line x1="400" y1="160" x2="560" y2="90"/>
    <line x1="400" y1="160" x2="610" y2="220"/>
    <line x1="400" y1="160" x2="460" y2="270"/>
    <line x1="400" y1="160" x2="220" y2="240"/>
    <line x1="400" y1="160" x2="180" y2="160"/>
  </g>

  <!-- giant italic V -->
  <text x="400" y="220" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="240" font-weight="400"
        fill="#f4f0e6" fill-opacity="0.94">V</text>

  <!-- nodes + labels -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#f4f0e6" filter="url(#glow)">
    <g><circle cx="240" cy="80"  r="5" fill="#a78bfa"/><text x="252" y="84">[[ideas]]</text></g>
    <g><circle cx="560" cy="90"  r="4" fill="#22d3ee"/><text x="572" y="94">daily</text></g>
    <g><circle cx="610" cy="220" r="5" fill="#a78bfa"/><text x="622" y="224">specs</text></g>
    <g><circle cx="460" cy="270" r="6" fill="#22d3ee"/><text x="472" y="274">MOC</text></g>
    <g><circle cx="220" cy="240" r="4" fill="#a78bfa"/><text x="232" y="244">refs</text></g>
    <g><circle cx="180" cy="160" r="5" fill="#22d3ee"/><text x="192" y="164">todo</text></g>
  </g>

  <!-- wordmark -->
  <text x="400" y="298" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto" font-size="11"
        letter-spacing="6" fill="#a78bfa" fill-opacity="0.9">VOLTEX · NOTES</text>
</svg>
