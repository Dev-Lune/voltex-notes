appId: in.devlune.voltex-desktop
productName: Voltex Notes
copyright: Copyright © 2026 DevLune Studios

# Strip unused Electron locales to reduce installer size by ~35MB
electronLanguages:
  - en

directories:
  output: release
  buildResources: build-resources

files:
  - dist-electron/**
  - public/**
  - "!node_modules/**"
  - "!.next/**"
  - "!src/**"

extraResources:
  - from: ".next/standalone"
    to: "next-server"
    filter:
      - "**/*"
  - from: ".next/static"
    to: "next-server/.next/static"
    filter:
      - "**/*"
  - from: "public"
    to: "next-server/public"
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: public/icon-512x512.png
  fileAssociations:
    - ext: md
      name: Markdown Note
      description: Open with Voltex Notes

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  target:
    - target: deb
      arch: [x64]
    - target: AppImage
      arch: [x64]
  icon: public/icon-512x512.png
  category: Office

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: public/icon-512x512.png
  category: public.app-category.productivity
  fileAssociations:
    - ext: md
      name: Markdown Note
      role: Editor

protocols:
  - name: Voltex Notes
    schemes:
      - voltex

publish:
  provider: github
  owner: Dev-Lune
  repo: voltex-notes
  releaseType: release

releaseInfo:
  releaseNotes: |
    ## What's New in v2.0.0

    ### Companion + Personalization
    - Added a new Companion settings tab with pet selection and enable/disable controls
    - Added five more themes and improved appearance customization
    - Added a live pet companion demo to the landing page

    ### Explorer + Editor Refresh
    - Redesigned the explorer/sidebar for cleaner spacing, alignment, and hierarchy
    - Fixed inconsistent folder/file sizes and indentation in the note tree
    - Polished editor tabs and toolbar interactions

    ### Vault + Sync UX
    - Vault access is now always visible in the explorer header
    - Added better empty-state flows for opening or creating vaults
    - Replaced the old sync toast with a centered sync decision dialog

    ### Reliability Fixes
    - Improved version history behavior
    - Synced workspace choice now respects account preferences
    - Removed duplicate theme IDs that caused Settings warnings
