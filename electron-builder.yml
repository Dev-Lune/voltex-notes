appId: in.devlune.voltex-desktop
productName: Voltex Notes
copyright: Copyright © 2026 DevLune Studios

directories:
  output: release
  buildResources: build-resources

files:
  - dist-electron/**
  - public/**
  - "!node_modules/**"
  - "!.next/**"
  - "!src/**"

extraResources:
  - from: ".next/standalone"
    to: "next-server"
    filter:
      - "**/*"
  - from: ".next/static"
    to: "next-server/.next/static"
    filter:
      - "**/*"
  - from: "public"
    to: "next-server/public"
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: public/icon-512x512.png
  fileAssociations:
    - ext: md
      name: Markdown Note
      description: Open with Voltex Notes

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  license: build-resources/license.rtf

linux:
  target:
    - target: deb
      arch: [x64]
    - target: AppImage
      arch: [x64]
  icon: public/icon-512x512.png
  category: Office

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: public/icon-512x512.png
  category: public.app-category.productivity
  fileAssociations:
    - ext: md
      name: Markdown Note
      role: Editor

protocols:
  - name: Voltex Notes
    schemes:
      - voltex

publish:
  provider: github
  owner: Dev-Lune
  repo: voltex-notes
  releaseType: release

releaseInfo:
  releaseNotes: |
    ## What's New in v1.1.0

    ### Features
    - Folder management — right-click folders to rename or delete them
    - Create Vault from Settings (no longer only in Welcome screen)
    - Google Sign-In now opens in your system browser (Electron)

    ### Fixes
    - Fixed file size inconsistency between root and folder notes in sidebar
    - Removed inaccessible default folders (Templates, Marketplace Data)
    - Mobile sidebar now has folder create/delete/rename support
    - Added rmdir and renameDir support for Electron vault operations
