appId: in.devlune.voltex-desktop
productName: Voltex Notes
copyright: Copyright © 2026 DevLune Studios

# Strip unused Electron locales to reduce installer size by ~35MB
electronLanguages:
  - en

directories:
  output: release
  buildResources: build-resources

files:
  - dist-electron/**
  - public/**
  - "!node_modules/**"
  - "!.next/**"
  - "!src/**"

extraResources:
  - from: ".next/standalone"
    to: "next-server"
    filter:
      - "**/*"
  - from: ".next/static"
    to: "next-server/.next/static"
    filter:
      - "**/*"
  - from: "public"
    to: "next-server/public"
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: public/icon-512x512.png
  fileAssociations:
    - ext: md
      name: Markdown Note
      description: Open with Voltex Notes

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  target:
    - target: deb
      arch: [x64]
    - target: AppImage
      arch: [x64]
  icon: public/icon-512x512.png
  category: Office

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: public/icon-512x512.png
  category: public.app-category.productivity
  fileAssociations:
    - ext: md
      name: Markdown Note
      role: Editor

protocols:
  - name: Voltex Notes
    schemes:
      - voltex

publish:
  provider: github
  owner: Dev-Lune
  repo: voltex-notes
  releaseType: release

releaseInfo:
  releaseNotes: |
    ## What's New in v1.3.0

    ### Canvas Fixes
    - Canvas notes now render as the visual canvas instead of raw JSON/code in editor mode
    - Fixed anchor/node interaction for attaching cards
    - Fixed color picker responsiveness and theme-aware canvas overlay styling

    ### Data Reset Improvements
    - Added `Delete all data` under `Settings > Account`
    - Reset now clears local notes, synced cloud data, current vault state, and recent vault entries
    - No more phantom `Untitled` note after wiping data

    ### Vault UX
    - Restored recent vault selection in the Explorer vault picker
    - Improved empty-vault state after reset and reopen
